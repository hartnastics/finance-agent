name: YouTube Transkripte laden

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:
    inputs:
      extra_url:
        description: 'Einzelne YouTube-URL (optional)'
        required: false
        default: ''

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install yt-dlp webvtt-py pyyaml youtube-transcript-api
      - run: python scripts/fetch_transcripts.py
      - name: Einzelne URL laden (falls angegeben)
        if: github.event.inputs.extra_url != ''
        run: python scripts/fetch_single.py "${{ github.event.inputs.extra_url }}"
      - name: Ins Repo speichern
        run: |
          git config user.name "Finance Bot"
          git config user.email "bot@finance-agent"
          git add knowledge/videos/
          git diff --staged --quiet || git commit -m "Transkripte $(date +'%Y-%m-%d')"
          git pull --rebase origin main
          git push